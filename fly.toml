# fly.toml — Fly.io deployment configuration
# Deploy with: fly deploy

app      = "scene-intel-classifier"   # change to your unique app name
primary_region = "cdg"                # Paris – change to your preferred region

[build]
  # Uses the Dockerfile in this directory

[env]
  PORT         = "8080"
  FLASK_ENV    = "production"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "2gb"
  cpus   = 2
  # For GPU support on Fly.io (requires GPU-capable region):
  # gpu_kind = "a10"
